<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="emoti-ai-style.css">
    <title>Emoti</title>
</head>
<body>
    <a href="main.html"><div class="banner"><h1><center>Emoti AI</center></h1></div></a>

    <div class="banner1">
        <div id="chatbox">
            <div id="messages"></div>
            <input id="userInput" type="text" placeholder="Ask Emoti something...">
            <button onclick="askClaude()">Send</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const CLAUDE_API_KEY = "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";
        const conversationHistory = [];

        window.addEventListener("DOMContentLoaded", () => {
            const messagesDiv = document.getElementById("messages");
            messagesDiv.innerHTML += `<div class="msg-ai"><b>Emoti:</b> Hey! I'm here to be your companion. Talk to me about anything that's on your mind.</div>`;
        });

        async function askClaude() {
            const messagesDiv = document.getElementById("messages");
            const input = document.getElementById("userInput");
            const userMessage = input.value.trim();
            if (!userMessage) return;

            const userDiv = document.createElement("div");
            userDiv.className = "msg-user";
            userDiv.innerHTML = `<b>You:</b> `;
            userDiv.appendChild(document.createTextNode(userMessage));
            messagesDiv.appendChild(userDiv);
            input.value = "";
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            conversationHistory.push({ role: "user", content: userMessage });

            const typingDiv = document.createElement("div");
            typingDiv.className = "msg-ai";
            typingDiv.id = "typing-indicator";
            typingDiv.innerHTML = `<b>Emoti:</b> <i>typing...</i>`;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const res = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": CLAUDE_API_KEY,
                        "anthropic-version": "2023-06-01",
                        "anthropic-dangerous-allow-browser": "true"
                    },
                    body: JSON.stringify({
                        model: "claude-haiku-4-5-20251001",
                        max_tokens: 500,
                        system: `You are Emoti, a warm, friendly, and supportive AI companion. 
                                You listen carefully and respond with empathy and encouragement. 
                                Keep responses concise and conversational. 
                                Never give medical diagnoses or replace professional help, 
                                but always be kind and supportive.`,
                        messages: conversationHistory
                    })
                });

                const data = await res.json();
                console.log(JSON.stringify(data, null, 2));

                document.getElementById("typing-indicator")?.remove();

                if (data.error) {
                    throw new Error(`API Error: ${data.error.message}`);
                }

                const aiRaw = data.content?.[0]?.text;

                if (!aiRaw) {
                    throw new Error("No response received from Claude.");
                }

                conversationHistory.push({ role: "assistant", content: aiRaw });

                const aiDiv = document.createElement("div");
                aiDiv.className = "msg-ai";
                aiDiv.innerHTML = `<b>Emoti:</b> ${marked.parse(aiRaw)}`;
                messagesDiv.appendChild(aiDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

            } catch (err) {
                console.error(err);
                document.getElementById("typing-indicator")?.remove();
                const errDiv = document.createElement("div");
                errDiv.className = "msg-ai";
                errDiv.innerHTML = `<b>Emoti:</b> Sorry, something went wrong — ${err.message}`;
                messagesDiv.appendChild(errDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        }

        document.getElementById("userInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                askClaude();
            }
        });

        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("active");
        }
    </script>
</body>
</html>
